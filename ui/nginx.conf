# nginx config for raftviz frontend container.
# Serves the built SPA and reverse-proxies API + WebSocket to the backend.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream raftviz_backend {
    server backend:8080;
    keepalive 16;
}

server {
    listen      80;
    server_name _;

    # Compression
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_min_length    256;
    gzip_comp_level    6;
    gzip_types         text/plain text/css application/javascript application/json image/svg+xml;

    # ── Static SPA ────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed JS/CSS — cache aggressively
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── WebSocket ────────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://raftviz_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── REST API ─────────────────────────────────────────────────────────
    location ~ ^/(nodes|submit|config|health) {
        proxy_pass         http://raftviz_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
